<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom practice</title>
    <style>
        body{
            background-color: lightblue;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Enter your Age First</h2>
    <input type="text" id="age" placeholder="Enter your age">
    <button onclick="checkAge()">Submit</button>
    <p id="Result">Based on your age, you will be notified </p>

    <script>
        function checkAge() {
            var age = document.getElementById("age").value;
            console.log("Your age is: " + age);
            if (age >= 18) {
                alert("You are allowed for this website");
                document.getElementById("Result").innerHTML = "Allowed";
            } else {
                alert("You are not allowed for this website");
                document.getElementById("Result").innerHTML = "Not Allowed";
            }
        }    </script>
</body>
</html>
