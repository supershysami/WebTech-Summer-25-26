<!DOCTYPE html>
<html>
<head>
    <title>Internship Form</title>
</head>
<body>

    <center>
        <h1>Internship Form</h1>
    
    </center>

    <h1 align="left">Information Related Information</h1>

    <form>
        <table>
            <tr>
                <td>Student Name:</td>
                <td><input type="text" name="name"></td>
            </tr>
            <tr>
                <td>Enter Your Email:</td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td>Preferred Internship Type:</td>
                <td>
                    <input type="radio" name="internshiptype" value="On_site"> On-site
                    <input type="radio" name="internshiptype" value="Remote"> Remote
                </td>
            </tr>
            <tr>
                <td>Internship Duration:</td>
                
                <td>
                    <select name="Internship_Duration"
                     <input type="dropdown" name="dropdown">
                    <option value="opt_one">6 Weeks</option>
                     <option value="opt_two">3 months</option>
                     </select>
                </td>

            </tr>
            <tr>
                <td>
                    Skills of Interest:
                </td>
                <td>
                    <input type="checkbox" name="Role" value="Web_Development"> Web Development
                    <input type="checkbox" name="Role" value="Data_Analysis"> Data Analysis 
                    <input type="checkbox" name="Role" value="Mobile_Apps"> Mobile Apps
                </td>
            </tr>
            <tr>
                <td>
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
